<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position and Z-index</title>
    <link rel="stylesheet" href="../css/style18.css">
    <style>
        div {
    width: 100px;
    height: 100px;
    background-color: #EEE;
}

.blue {
    background-color: blue;
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 1;
}

.green {
    position: absolute;
    top : 30px;
    left: 30px;
    background-color: green;
    z-index: 2;
}

.red {
    background-color: red;
    position: absolute;
    top: 40px;
    left: 40px;
    z-index: 3;
}

.black {
    background-color: black;
    position: absolute;
    top: 30px;
    left: 20px;
    z-index: 0;
}
    </style>
</head>
<body>
    <div class="green"></div>
    <div class="red"></div>
    <div class="blue"></div>
    <div class="black"></div>
</body>
</html>
