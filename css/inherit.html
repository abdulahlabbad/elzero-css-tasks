<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inherit</title>
    <link rel="stylesheet" href="../css/style13.css">
    <style>
        div {
    width: 400px;
    margin: auto;
    padding: 25px;
    text-align: center;
    border: 3px solid red;
}

div p {
    border: inherit;
    background-color: #DDD;
    width: 300px;
    margin: inherit;
    padding: inherit;
}
    </style>
</head>
<body>
    <div>
    <p>This Is Paragraph</p>
    </div>
</body>
</html>
