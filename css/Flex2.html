<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="../css/style33.css">
    <style>
        * {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

.parent {
    width: 600px;
    height: 300px;
    background-color: #DDD;
    margin: 20px auto;
    display: flex;
    flex-flow: row wrap;
    align-items: flex-end;
    justify-content: space-between;
    align-content: space-between;
}

.parent div {
    width: calc(88% / 3);
    height: 40px;
    background-color: #F00;
    margin: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
}
    </style>
</head>
<body>
    <div class="parent">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
</div>
</body>
</html>
