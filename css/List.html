<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <link rel="stylesheet" href="../css/style19.css">
    <style>
      ul {
    width: 400px;
    overflow: hidden;
    margin: auto;
    background-color: #eee;
    padding: 10px;
}

.all-li {
    list-style-type: none;
}

.html {
    width: 340px;
    margin: 10px 20px 10px 0;
    background-color: white;
    list-style-position: outside;
    padding: 10px;
}


.css {
    width: 340px;
    margin: 10px 20px 10px 0;
    background-color: white;
    list-style-position: outside;
    list-style-type: upper-roman;
    padding: 10px;
}

.js {
    width: 370px;
    margin: 10px 20px 10px 0;
    background-color: white;
    list-style-position: inside;
    padding: 10px;
}
    </style>
</head>
<body>
    <ul>
      <li class="all-li">
        HTML
        <ol start="10">
          <li class="html">Slim</li>
          <li class="html">Pugjs</li>
          <li class="html">HAML</li>
        </ol>
      </li>
      <li class="all-li">
        CSS
        <ol>
          <li class="css">SASS</li>
          <li class="css">LESS</li>
          <li class="css">PostCSS</li>
        </ol>
      </li>
      <li class="all-li">
        JavaScript
        <ul>
          <li class="js">Vuejs</li>
          <li class="js">Sveltejs</li>
        </ul>
      </li>
    </ul>
</body>
</html>
