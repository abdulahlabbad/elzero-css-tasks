<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid column and row</title>
    <link rel="stylesheet" href="../css/style42.css">
    <style>
        * {
  box-sizing: border-box;
}

.grid {
    background-color: #ddd;
    padding: 20px;
    width: 800px;
    height: 400px;
    margin: auto;
    display: grid;
    grid-template-columns: auto repeat(14 , 1fr) repeat(4 , 1fr) auto;
    grid-template-rows: repeat(10, 1fr);
    gap: 10px;
}

.grid div {
    background-color: #333232;
    color: white;
    display: grid;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 25px;
}

.one {
    grid-row: 1 / 10;
}

.two {
    grid-column: 2 / 11;
    grid-row: 1 / 10;
}

.three {
    grid-column: 11 / 20;
    grid-row: 1 / 10;
}

.four {
    grid-row: 1 / 10;
}

.six {
    grid-column: 2 / 11;
}

.seven {
    grid-column: 11 / 20;
}
    </style>
</head>
<body>
    <div class="grid">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="five">5</div>
        <div class="six">6</div>
        <div class="seven">7</div>
        <div class="eight">8</div>
    </div>
</body>
</html>
