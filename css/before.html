<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>::before</title>
    <link rel="stylesheet" href="../css/style23.css">
    <style>
        div {
    width: 450px;
    height: 40px;
    padding: 25px;
    line-height: 1.6;
    margin: auto;
    background-color: #DDD;
    position: relative;
    font-size: 22px;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}

div::before {
    content: "1";
    width: 45px;
    height: 75%;
    background-color: red;
    color: white;
    position: absolute;
    left: -20px;
    top: 10px;
    margin: auto;
    text-align: center;
    font-size: 30px;
    line-height: 2;
    font-weight: bold;
}
    </style>
</head>
<body>
    <div>Hello, Welcome To Elzero Web School</div>
</body>
</html>
