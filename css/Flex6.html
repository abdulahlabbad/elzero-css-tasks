<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="../css/style37.css">
    <style>
        * {
    box-sizing: border-box;
}

body {
    font-size: x-small;
    font-family: Arial, Helvetica, sans-serif;
}

.page {
    display: flex;
    width: 600px;
    height: 300px;
    background-color: #EEE;
    justify-content: space-between;
    margin: auto;
    flex-flow: column wrap;
}

.header {
    display: flex;
}

.header .logo {
    width: 75px;
    height: 30px;
    display: flex;
    background-color: #DDD;
    justify-content: center;
    align-items: center;
    margin: 10px;
}

.header .links {
    list-style-type: none;
    display: flex;
    background-color: #DDD;
    width: 485px;
    height: 30px;
    justify-content: flex-end;
    align-items: center;
    margin: 10px;
}

.header .links li {
    margin-right: 10px;
}

.main-area {
    display: flex;
    margin-bottom: 30px;
    height: 195px;
}

.main-area .content {
    display: flex;
    width: 355px;
    height: 215px;
    background-color: #DDD;
    margin: 0 10px 10px 10px;
    padding: 10px;
}

.main-area .sidebar {
    display: flex;
    width: 215px;
    height: 215px;
    background-color: #DDD;
    padding: 10px;
}

.footer {
    display: flex;
    width: 580px;
    background-color: #DDD;
    height: 25px;
    padding: 8px;
    margin: 0 auto;
}

.footer .copyright {
    display: flex
}

.footer .design {
    display: flex;
    margin-left: auto;
}
    </style>
</head>
<body>
    <div class="page">
    <div class="header">
        <div class="logo">Logo</div>
        <ul class="links">
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
        </ul>
    </div>
    <div class="main-area">
        <div class="content">Content</div>
        <div class="sidebar">Sidebar</div>
    </div>
    <div class="footer">
        <div class="copyright">Copyright 2021</div>
        <div class="design">Designed By Elzero</div>
    </div>
    </div>
</body>
</html>
