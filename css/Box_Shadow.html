<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Shadow</title>
    <link rel="stylesheet" href="../css/style26.css">
    <style>
        div {
    width: 100px;
    height: 100px;
    background-color: #EEE;
    border-radius: 50%;
    border: 1px solid #000;
    display: inline-block;
    margin: 50px;
    box-shadow: 5px 5px 0 0 #0202ff91 , -5px -5px 0 0 #ff0000a8;
}
    </style>
</head>
<body>
    <div></div>
    <div></div>
    <div></div>
</body>
</html>
