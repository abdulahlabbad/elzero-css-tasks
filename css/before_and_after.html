<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>::before and ::after</title>
    <link rel="stylesheet" href="../css/style24.css">
    <style>
        p {
    background-color: #EEE;
    margin-left: 100px;
    padding: 10px;
    width: 400px;
    height: 30px;
    line-height: 1.5;
    border-left: 5px solid red;
}

p::after {
    content: "";
    background-color: white;
    width: 0px;
    height: 0px;
    border-color: transparent red transparent transparent;
    border-width: 10px;
    border-style: solid;
    position: absolute;
    left: 89px;
    margin-top: 5px;
}

p::before {
    content: attr(data-person);
    background-color: #DDD;
    position: absolute;
    left: 10px;
    text-align: center;
    width: 60px;
    height: 15px;
    padding: 10px;
    margin-bottom: 25px;
    line-height: 1.1;
}
    </style>
</head>
<body>
    <p data-person="Osama">This Is Very Very Long Comment Number One</p>
    <p data-person="Ahmed">This Is Very Very Long Comment Number Two</p>
    <p data-person="Sayed">This Is Very Very Long Comment Number Three</p>
</body>
</html>
