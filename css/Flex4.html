<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="../css/style35.css">
    <style>
        .parent {
    width: 600px;
    height: 300px;
    background-color: #DDD;
    margin: 20px auto;
    display: flex;
    justify-content: space-between;
    flex-flow: column wrap;
}

.one {
    display: flex;
    width: 25px;
    height: 70px;
    background-color: limegreen;
    justify-content: center;
    align-items: center;
    order: 1;
    margin: 10px;
    align-self: flex-end;
}

.two {
    display: flex;
    width: 300px;
    height: 65px;
    background-color: limegreen;
    margin: 10px;
    justify-content: center;
    align-items: center;
    align-self: flex-start;
    order: 2;
}

.three {
    display: flex;
    width: 25px;
    height: 70px;
    background-color: limegreen;
    justify-content: center;
    align-items: center;
    margin: 10px;
    align-self: flex-end;
    order: 3;
}
    </style>
</head>
<body>
    <div class="parent">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
    </div>
</body>
</html>
