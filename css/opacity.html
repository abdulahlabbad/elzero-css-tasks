<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opacity</title>
    <link rel="stylesheet" href="../css/style17.css">
    <style>
        div {
    margin: 20px auto;
    width: 300px;
    font-weight: bold;
    font-size: 1rem;
    padding: 20px;
    background-color: #ddd;
    color: black;
}

.one {
    background-color: rgb(221 , 221 , 221 , 0.1);
}

.two {
    opacity: 0.1;
}

    </style>
</head>
<body>
    <div class="normal">Normal</div>
    <div class="one">One</div>
    <div class="two">Two</div>
</body>
</html>
