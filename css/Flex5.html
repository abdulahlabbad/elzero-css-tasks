<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="../css/style36.css">
    <style>
        .parent {
    display: flex;
    width: 600px;
    height: 300px;
    margin: auto;
    background-color: #DDD;
    justify-content: space-between;
}

.four {
    display: flex;
    height: 160px;
    background-color: blueviolet;
    width: 100px;
    justify-content: center;
    align-items: center;
    order: -4;
    align-self: flex-end;
    color: white;
    margin: 10px;
}

.one {
    display: flex;
    height: 160px;
    background-color: orange;
    width: 100px;
    justify-content: center;
    align-items: center;
    order: -3;
    align-self: flex-start;
    color: white;
    margin: 10px;
}

.two {
    display: flex;
    height: 160px;
    background-color: lawngreen;
    width: 100px;
    justify-content: center;
    align-items: center;
    order: -2;
    align-self: flex-end;
    color: white;
    margin: 10px;
}

.three {
    display: flex;
    height: 160px;
    background-color: saddlebrown;
    width: 100px;
    justify-content: center;
    align-items: center;
    order: -2;
    align-self: flex-start;
    color: white;
    margin: 10px;
}
    </style>
</head>
<body>
    <div class="parent">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
    </div>
</body>
</html>
