<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <link rel="stylesheet" href="../css/style28.css">
    <style>
        * {
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
}

.Parent {
    width: 300px;
    background: #EEE;
    margin-left: 150px;
    margin-top: 100px;
    padding: 150px;
    float: left;
    position: relative;
}

.Basic {
    width: 250px;
    height: 50px;
    background: #369eff;
    margin-right: 10px;
    position: absolute;
    top: 25px;
    right: 15px;
    border-radius: 5px;
    text-align: center;
    padding-top: 10px;
    font-weight: bold;
    color: white;
    font-size: x-large;
}

.Pro {
    width: 250px;
    height: 50px;
    background: #369eff;
    margin-right: 138px;
    position: absolute;
    top: 25px;
    right: -115px;
    border-radius: 5px;
    text-align: center;
    padding-top: 10px;
    font-weight: bold;
    color: white;
    font-size: x-large;
}

.Free {
    width: 200px;
    height: 200px;
    background-color: #DDD;
    border-radius: 50%;
    position: absolute;
    left: 52px;
    bottom: 10px;
    text-align: center;
    padding-top: 65px;
    font-size: xxx-large;
}

.line {
    width: 1px;
    height: 300px;
    background-color: #369eff;
    position: absolute;
    right: 605px;
    top: 110px;
}

.or {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background-color: #369eff;
    text-align: center;
    padding-top: 3px;
    position: absolute;
    top: 45%;
    right: -12px;
}
    </style>
</head>
<body>
    <div class="Parent">
        <div class="Basic">Basic</div>
        <div class="Free">Free</div>
    </div>
    <div class="line">
        <div class="or">or</div>
    </div>
    <div class="Parent">
        <div class="Pro">Pro</div>
        <div class="Free">30$</div>
    </div>
</body>
</html>
