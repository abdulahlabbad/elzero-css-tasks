<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>::before and ::after</title>
    <link rel="stylesheet" href="../css/style25.css">
    <style>
        p {
    background-color: #DDD;
    width: 400px;
    height: 40px;
    padding-top: 20px;
    padding-left: 40px;
    margin-left: 50px;
    line-height: 1.4;
    position: relative;
}

p::after {
    content: "";
    background-color: red;
    width: 5px;
    height: 100%;
    position: absolute;
    right: 0;
    top: 0;
}

p::before {
    content: attr(data-number);
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background-color: red;
    color: white;
    padding: 0px;
    margin-left: -15px;
    width: 50px;
    text-align: center;
    line-height: 3.5;
    font-weight: bold;
}
    </style>
</head>
<body>
    <p data-number = "1">This Is Very Very Long Product Title</p>
    <p data-number = "2">This Is Very Very Long Product Title</p>
    <p data-number = "3">This Is Very Very Long Product Title</p>
    <p data-number = "4">This Is Very Very Long Product Title</p>
    <p data-number = "5">This Is Very Very Long Product Title</p>
    <p data-number = "6">This Is Very Very Long Product Title</p>
</body>
</html>
