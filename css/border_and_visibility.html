<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border and Visibility</title>
    <link rel="stylesheet" href="../css/style6.css">
    <style>
        div {
    width: 400px;
    background-color: #DDD;
    margin: 20px;
    padding: 20px;
    display: inline-block;
}

.element-element-1 {
    border-left: 10px solid rgb(231, 106, 106);
}

.element-element-2 {
    visibility: hidden;
}

.element-element-3 {
    border-left: 10px solid rgb(96, 218, 83);
}
    </style>
</head>
<body>
    <div class="element-element-1">This Is Important Note</div>
    <div class="element-element-2">This Is Important Note</div>
    <div class="element-element-3">This Is Important Note</div>
</body>
</html>
