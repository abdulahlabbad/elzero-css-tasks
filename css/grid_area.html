<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid area</title>
    <link rel="stylesheet" href="../css/style43.css">
    <style>
        .grid {
    background-color: #ddd;
    padding: 20px;
    width: 800px;
    height: 400px;
    display: grid;
    gap: 20px;
    margin: auto;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
}

.grid div {
    display: grid;
    justify-content: center;
    align-items: center;
    color: white;
    background-color: #3784f5;
    font-weight: bold;
    font-size: 25px;
}

.eight {
    grid-area: 1 / 1 / 1 / 7;
}

.two {
    grid-area: 2 / 1 / 2 / 5;
}

.three {
    grid-area: 2 / 5 / 2 / 7;
}

.five {
    grid-area: 3 / 3 / 6 / 7;
}

.four {
    grid-area: 3 / 1 / 3 / 3;
}

.six {
    grid-area: 4 / 1 / 4 / 3;
}

.seven {
    grid-area: 5 / 1 / 5 / 3;
}

.one {
    grid-area: 6 / 1 / 6 / 7;
}
    </style>
</head>
<body>
    <div class="grid">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="five">5</div>
        <div class="six">6</div>
        <div class="seven">7</div>
        <div class="eight">8</div>
    </div>
</body>
</html>
