<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="../css/style34.css">
    <style>
        .parent {
    display: flex;
    flex-flow: column wrap;
    width: 600px;
    height: 300px;
    margin: 0 auto;
    align-content: space-between; 
    background-color: #DDD;
}

.parent  div {
    width: 180px;
    background-color: #3b7a94; 
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

.six {
    order: 1;
    height: 180px; 
}
.five {
    order: 2;
    height: 120px;
}

.three {
    order: 3;
    height: 40px;  
}
.two {
    order: 4;
    height: 140px; 
    margin-top: auto; 
}

.four {
    order: 5;   
    height: 180px; 
}
.one {
    order: 6;
    height: 40px;
    margin-top: auto;
}
    </style>
</head>
<body>
    <div class="parent">
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>
    <div class="four">4</div>
    <div class="five">5</div>
    <div class="six">6</div>
</div>
</div>
</body>
</html>
